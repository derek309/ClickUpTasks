<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickUpTasks Helper — Settings</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>ClickUpTasks Helper</h1>
      <p class="hint">
        This runs quietly in your menu bar / system tray. Clicking "Work with
        Claude" on a task in ClickUpTasks opens a terminal here, already
        looking up that task.
      </p>

      <label for="repoPath">Repo folder</label>
      <div class="row">
        <input id="repoPath" type="text" placeholder="/path/to/clickuptasks" autocomplete="off" />
        <button id="browse" type="button">Browse…</button>
      </div>
      <p id="status" class="status"></p>
      <button id="save" type="button">Save</button>
    </main>
  </body>
</html>
