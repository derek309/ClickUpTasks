<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Create ClickUpTasks task</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; padding: 14px; color: #1B3A5C; max-width: 420px; }
  h1 { font-size: 15px; margin: 0 0 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #refresh { width: auto; margin-top: 0; padding: 5px 8px; font-size: 12px; background: #fff; color: #1B3A5C; border: 1px solid #d0dce8; }
  label { display: block; font-size: 12px; font-weight: 600; margin: 8px 0 4px; }
  select, input, textarea { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #d0dce8; border-radius: 6px; font-size: 13px; font-family: inherit; }
  textarea { resize: vertical; min-height: 50px; }
  #title { resize: vertical; min-height: 40px; }
  button { width: 100%; margin-top: 12px; background: #1B3A5C; color: #fff; border: none; border-radius: 6px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  #enrich { margin-top: 8px; background: #fff; color: #E87722; border: 1px solid #E87722; }
  #matchHint { font-size: 11px; margin-top: 3px; color: #64748b; }
  #status { font-size: 12px; margin-top: 8px; }
  .ok { color: #16a34a; }
  .err { color: #dc2626; }
  #needsToken { font-size: 12px; color: #64748b; display: none; }
  #needsToken a { color: #E87722; }
  .combo { position: relative; }
  #clientResults { position: absolute; z-index: 10; top: 100%; left: 0; right: 0; max-height: 240px; overflow-y: auto; background: #fff; border: 1px solid #d0dce8; border-top: none; border-radius: 0 0 6px 6px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
  #clientResults.open { display: block; }
  .result-row { padding: 6px 9px; cursor: pointer; }
  .result-row:hover { background: #EEF4FB; }
  .result-name { font-size: 13px; font-weight: 600; }
  .result-sub { font-size: 11px; color: #64748b; }
</style>
</head>
<body>
  <h1>Create ClickUpTasks task <button id="refresh" type="button" title="Re-read the currently open email">🔄 Refresh</button></h1>
  <div id="form">
    <label for="clientSearch">Client</label>
    <div class="combo">
      <input id="clientSearch" type="text" placeholder="Search by name, business, or contact…" autocomplete="off" />
      <div id="clientResults"></div>
    </div>
    <div id="matchHint"></div>
    <label for="project">List (optional)</label>
    <select id="project"><option value="">Default</option></select>
    <label for="title">Title</label>
    <textarea id="title" rows="2"></textarea>
    <label for="notes">Notes</label>
    <textarea id="notes"></textarea>
    <button id="enrich" type="button">✨ Enrich with AI</button>
    <button id="create">Create Task</button>
    <div id="status"></div>
  </div>
  <div id="needsToken">
    No API token configured yet. <a href="#" id="openOptions">Open settings</a> to paste one.
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
